stages:
  - release

variables:
  DEBIAN_FRONTEND: "noninteractive"
  ZIG_VERSION: "0.16.0"
  ANDROID_API_LEVEL: "34"
  ANDROID_BUILD_TOOLS_LEVEL: "35.0.0"
  ANDROID_NDK_VERSION: "26.3.11579264"
  ANDROID_CMDLINE_TOOLS_VERSION: "11076708"
  ANDROID_SDK_ROOT: "$CI_PROJECT_DIR/.android-sdk"
  ANDROID_HOME: "$CI_PROJECT_DIR/.android-sdk"
  ANDROID_NDK_HOME: "$CI_PROJECT_DIR/.android-sdk/ndk/26.3.11579264"
  ZIG_ROOT: "$CI_PROJECT_DIR/.zig"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  VULKAN_SDK: "/usr"

android-release-aab:
  stage: release
  image: ubuntu:24.04
  rules:
    - if: '$CI_COMMIT_TAG'
  cache:
    key: android-release-v1
    paths:
      - .android-sdk/
      - .gradle/caches/
      - .gradle/wrapper/
      - .zig/
  before_script:
    - apt-get update
    - >
      apt-get install -y --no-install-recommends
      ca-certificates
      curl
      make
      openjdk-21-jdk-headless
      unzip
      xz-utils
      glslang-tools
      libwayland-dev
      libxkbcommon-dev
      libvulkan-dev
      libegl-dev
      libc6-dev
    - mkdir -p "$ANDROID_SDK_ROOT" "$ZIG_ROOT" "$GRADLE_USER_HOME"
    - |
      if [ ! -x "$ZIG_ROOT/zig" ]; then
        curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
          | tar -xJ --strip-components=1 -C "$ZIG_ROOT"
      fi
    - export PATH="$ZIG_ROOT:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    - |
      if [ ! -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
        rm -rf "$ANDROID_SDK_ROOT/cmdline-tools"
        mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
        curl -fsSL \
          "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMDLINE_TOOLS_VERSION}_latest.zip" \
          -o /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
        mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
      fi
    - yes | sdkmanager --licenses >/dev/null
    - >
      sdkmanager
      "platform-tools"
      "platforms;android-${ANDROID_API_LEVEL}"
      "build-tools;${ANDROID_BUILD_TOOLS_LEVEL}"
      "ndk;${ANDROID_NDK_VERSION}"
    - chmod +x android/gradlew
    - test -n "$ANDROID_KEYSTORE"
    - test -n "$ANDROID_KEY_ALIAS"
    - test -n "$ANDROID_KEYSTORE_PASSWORD"
    - test -n "$ANDROID_KEY_PASSWORD"
  script:
    - export PATH="$ZIG_ROOT:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    - make sign-android-release
  artifacts:
    name: "android-release-$CI_COMMIT_TAG"
    paths:
      - build/gem-test-android.aab
      - build/gem-test-android-signed.aab
    expire_in: 1 week
